<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Match Schedule Tracker | FIFA Club World Cup 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header Navigation -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-soccer-ball"></i>
                <h1>Match Tracker</h1>
            </div>
            <nav class="nav-tabs">
                <button class="nav-btn active" data-tab="dashboard">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button>
                <button class="nav-btn" data-tab="matches">
                    <i class="fas fa-calendar"></i> Matches
                </button>
                <button class="nav-btn" data-tab="add-match">
                    <i class="fas fa-plus-circle"></i> Add Match
                </button>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Dashboard Tab -->
        <section id="dashboard" class="tab-content active">
            <!-- Statistics Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-futbol"></i>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">Total Matches</p>
                        <p class="stat-value" id="totalMatches">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-hourglass-end"></i>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">Upcoming</p>
                        <p class="stat-value" id="upcomingCount">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-eye"></i>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">Watched</p>
                        <p class="stat-value" id="watchedCount">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">Watched %</p>
                        <p class="stat-value" id="watchedPercentage">0%</p>
                    </div>
                </div>
            </div>

            <!-- Next Match Countdown -->
            <div class="next-match-section">
                <h2><i class="fas fa-clock"></i> Next Match Countdown</h2>
                <div class="countdown-card" id="countdownCard">
                    <div class="countdown-placeholder">
                        <i class="fas fa-search"></i>
                        <p>No upcoming matches</p>
                    </div>
                </div>
            </div>

            <!-- Favorites Section -->
            <div class="favorites-section">
                <h2><i class="fas fa-heart"></i> Your Favorite Matches</h2>
                <div class="matches-grid" id="favoritesGrid">
                    <div class="empty-state">
                        <i class="fas fa-star"></i>
                        <p>No favorite matches yet</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Matches Tab -->
        <section id="matches" class="tab-content">
            <!-- Search and Filter Bar -->
            <div class="filter-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by team name...">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="filter-btn" data-filter="upcoming">
                        <i class="fas fa-hourglass-end"></i> Upcoming
                    </button>
                    <button class="filter-btn" data-filter="live">
                        <i class="fas fa-circle"></i> Live
                    </button>
                    <button class="filter-btn" data-filter="finished">
                        <i class="fas fa-check-circle"></i> Finished
                    </button>
                    <button class="filter-btn" data-filter="watched">
                        <i class="fas fa-eye"></i> Watched
                    </button>
                </div>
            </div>

            <!-- Matches Container -->
            <div class="matches-grid" id="matchesGrid">
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <p>No matches found</p>
                </div>
            </div>
        </section>

        <!-- Add Match Tab -->
        <section id="add-match" class="tab-content">
            <div class="form-container">
                <h2>Add New Match</h2>
                <form id="addMatchForm">
                    <div class="form-group">
                        <label for="teamA">Team A *</label>
                        <input type="text" id="teamA" placeholder="Enter team name" required>
                    </div>
                    <div class="form-group">
                        <label for="teamB">Team B *</label>
                        <input type="text" id="teamB" placeholder="Enter team name" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="matchDate">Date *</label>
                            <input type="date" id="matchDate" required>
                        </div>
                        <div class="form-group">
                            <label for="matchTime">Time *</label>
                            <input type="time" id="matchTime" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="stadium">Stadium</label>
                            <input type="text" id="stadium" placeholder="Enter stadium name">
                        </div>
                        <div class="form-group">
                            <label for="group">Group/Competition</label>
                            <input type="text" id="group" placeholder="e.g., Group A">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="upcoming">Upcoming</option>
                            <option value="live">Live</option>
                            <option value="finished">Finished</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Match
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- Edit Match Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Match</h2>
                <button class="close-btn" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="editMatchForm">
                <input type="hidden" id="editMatchId">
                <div class="form-group">
                    <label for="editTeamA">Team A *</label>
                    <input type="text" id="editTeamA" required>
                </div>
                <div class="form-group">
                    <label for="editTeamB">Team B *</label>
                    <input type="text" id="editTeamB" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editMatchDate">Date *</label>
                        <input type="date" id="editMatchDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editMatchTime">Time *</label>
                        <input type="time" id="editMatchTime" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editStadium">Stadium</label>
                        <input type="text" id="editStadium">
                    </div>
                    <div class="form-group">
                        <label for="editGroup">Group/Competition</label>
                        <input type="text" id="editGroup">
                    </div>
                </div>
                <div class="form-group">
                    <label for="editStatus">Status</label>
                    <select id="editStatus">
                        <option value="upcoming">Upcoming</option>
                        <option value="live">Live</option>
                        <option value="finished">Finished</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
